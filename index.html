<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skyview 드론 영상</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1 class="logo">TONY SKYVIEW</h1>
      <p class="tagline">개인 드론 영상 모음</p>
    </header>

    <main>
      <section class="banner" aria-label="대표 배너">
        <!-- 배너 높이는 이미지 비율에 맞춰 자동(잘리지 않음) -->
        <img
          class="banner-img"
          src="images/songak.png"
          alt="송악산 해안 드론 촬영 풍경"
        />
        <div class="banner-text">
          <h2>송악산, 바다 위의 녹색 무대</h2>
          <p>제주 해안을 내려다본 드론 영상을 만나보세요.</p>
        </div>
      </section>

      <section class="row" aria-label="추천 영상">
        <h2 class="row-title">추천 드론 영상</h2>
        <div class="cards">
          <article class="card">
            <img
              src="images/sea_cave.jpg"
              alt="해식동굴 드론 촬영 썸네일"
              width="400"
              height="225"
            />
            <h3>해식동굴</h3>
            <p>파도 침식으로 형성된 동굴</p>
          </article>
          <article class="card">
            <img
              src="images/daepo.jpg"
              alt="대포주상절리대 드론 촬영 썸네일"
              width="400"
              height="225"
            />
            <h3>대포주상절리대</h3>
            <p>제주 화산 활동의 흔적</p>
          </article>
          <article class="card">
            <img
              src="images/sungsan.jpg"
              alt="성산일출봉 드론 촬영 썸네일"
              width="400"
              height="225"
            />
            <h3>성산일출봉</h3>
            <p>바다 위 응회구 화산체</p>
          </article>
          <article class="card">
            <img
              src="images/tiger_island.jpg"
              alt="범섬 해식동굴 드론 촬영 썸네일"
              width="400"
              height="225"
            />
            <h3>범섬 해식동굴</h3>
            <p>절벽 안쪽의 숨은 공간</p>
          </article>
          <!-- 새 카드: tafoni.jpg -->
          <article class="card">
            <img
              src="images/tafoni.jpg"
              alt="갯깍주상절리대 드론 촬영 썸네일"
              width="400"
              height="225"
            />
            <h3>갯깍주상절리대</h3>
            <p>벌집풍화가 만든 암석 구조</p>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 Tony Skyview. HTML/CSS Practice Project.</p>
    </footer>
  </body>
</html>
